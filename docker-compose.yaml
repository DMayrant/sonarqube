version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: strong_password_123   # 🔐 change this
      POSTGRES_DB: sonar                      # ✅ REQUIRED
    volumes:
      - postgresql:/var/lib/postgresql/data
    networks:
      - sonarnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:lts                      # ✅ use LTS (stable)
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy           # ✅ waits for DB
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar   # ✅ matches DB
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: strong_password_123
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - sonarnet

volumes:
  postgresql:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

networks:
  sonarnet:
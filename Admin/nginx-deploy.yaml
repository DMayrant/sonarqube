apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: nginx-deploy
  name: nginx-deploy
  namespace: admin
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx-deploy
  template:
    metadata:
      labels:
        app: nginx-deploy
    spec:
      serviceAccountName: admin
      automountServiceAccountToken: false
      containers:
        - image: nginx:1.28.0
          name: nginx
          ports:
            - name: http
              containerPort: 80
          resources:
            limits:
              memory: 256Mi
            requests:
              memory: 128Mi
              cpu: 75m
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 12
            periodSeconds: 15
